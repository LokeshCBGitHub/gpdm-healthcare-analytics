############################################################
# databricks.cfg — Databricks Connection Configuration
# GPDM Healthcare Analytics Chatbot
############################################################
#
# This file configures the connection to Databricks SQL Warehouse
# for production data access. The chatbot auto-detects this file
# at startup — if present and valid, queries go to Databricks;
# otherwise, the system falls back to local CSV/SQLite.
#
# CREDENTIALS PRIORITY:
#   1. Environment variables (always override this file)
#   2. Values in this file
#
# SECURITY:
#   - Never commit tokens/secrets to version control
#   - Use environment variables in CI/CD and production
#   - For OAuth, use a Service Principal (not personal tokens)
#
# HIPAA:
#   - All connections are TLS-encrypted (HTTPS)
#   - No PHI is logged — only query metadata
#   - Audit logs track all data access
############################################################

# ===== Connection =====
# Databricks workspace URL (without https://, without trailing /)
# Example: adb-1234567890123456.12.azuredatabricks.net
DATABRICKS_HOST=

# SQL Warehouse ID (found in SQL Warehouses → your warehouse → Connection details)
# Example: abc123def456ghi7
DATABRICKS_WAREHOUSE_ID=

# ===== Authentication: Option A — Personal Access Token (PAT) =====
# Generate at: User Settings → Developer → Access Tokens
# Format: dapi_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
# Recommended for: development, individual use
DATABRICKS_TOKEN=

# ===== Authentication: Option B — OAuth2 Service Principal =====
# Register at: Account Console → Service Principals → Add
# Recommended for: production, CI/CD, shared services
# DATABRICKS_CLIENT_ID=
# DATABRICKS_CLIENT_SECRET=

# ===== Unity Catalog =====
# Catalog name (Unity Catalog)
DATABRICKS_CATALOG=healthcare_prod

# Schema name within the catalog
DATABRICKS_SCHEMA=analytics

# ===== Optional: HTTP Path (for JDBC/ODBC compatibility) =====
# Found in SQL Warehouses → your warehouse → Connection details
# Example: /sql/1.0/warehouses/abc123def456ghi7
# DATABRICKS_HTTP_PATH=

# ===== Performance =====
# Query timeout in seconds (default: 120)
DATABRICKS_TIMEOUT=120

# Max retry attempts for transient errors (default: 3)
DATABRICKS_MAX_RETRIES=3
