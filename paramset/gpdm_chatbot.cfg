############################################################
# gpdm_chatbot.cfg — Config for GPDM Healthcare Demo
# LOCAL DEMO — No IICS, No Databricks
############################################################

# ===== Paths =====
APP_DIR="/Users/lokeshbandarupalli/chatbot/gpdm_demo"
BASE_DIR="${APP_DIR}"
LOG_DIR="${BASE_DIR}/logs"
PARM_DIR="${BASE_DIR}/paramset"

# ===== Data =====
DATA_DIR="${BASE_DIR}/data"
RAW_DIR="${DATA_DIR}/raw"
STAGING_DIR="${DATA_DIR}/staging"
PROCESSED_DIR="${DATA_DIR}/processed"
DQ_DIR="${DATA_DIR}/dq"
RECON_DIR="${DATA_DIR}/recon"
ARCHIVE_DIR="${DATA_DIR}/archive"

# ===== Semantic Catalog =====
CATALOG_DIR="${BASE_DIR}/semantic_catalog"

# ===== Engine =====
ENGINE_MODE="hybrid"
# hybrid = IR + ML + LLM + template (uses all from-scratch components)
# template = rule-based only
# neural = ML models only

# ===== Local SQLite =====
# Execute queries locally against CSV data loaded into SQLite
LOCAL_EXECUTION=1
SQLITE_DB="${BASE_DIR}/data/healthcare_demo.db"

# ===== Sessions =====
USER_SESSIONS_DIR="${BASE_DIR}/user_sessions"

# ===== Models =====
NEURAL_MODEL_PATH="${BASE_DIR}/model/intent_model.json"
LLM_MODEL_PATH="${BASE_DIR}/model/scratch_llm.pkl"
IR_INDEX_PATH="${BASE_DIR}/model/ir_index.json"

# ===== Lineage =====
LINEAGE_DIR="${BASE_DIR}/lineage"

# ===== Analytics =====
ANALYTICS_DIR="${BASE_DIR}/analytics"

# ===== Dashboard =====
DASHBOARD_DIR="${BASE_DIR}/dashboard"

# ===== Training =====
TRAINING_DATA_DIR="${BASE_DIR}/training_data"
COLLECT_TRAINING_DATA=1

# ===== Tuning =====
QUERY_RESULT_LIMIT=500
MAX_CONTEXT_TABLES=20
